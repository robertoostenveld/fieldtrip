name: Synchronize private files

on:
#  push:
#    branches:
#      - master,main
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-citations:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to push changes back

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch all history for proper commits

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Synchronize private files
      run: |
        python .github/scripts/synchronize-private.py

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Commit changes
      run: |
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Automatically synchronized files"

    - name: Push changes
      run: |
        git push origin HEAD:${GITHUB_REF#refs/heads/}